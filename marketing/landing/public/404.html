<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="robots" content="noindex" />
  <title>HazardLink — page not found</title>
  <style>
    :root { --orange:#ff8800; --ink:#0f172a; --grey:#94a3b8; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--ink); color: #f8fafc;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; text-align: center; -webkit-font-smoothing: antialiased;
    }
    .card { max-width: 420px; }
    .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 24px; }
    .logo .dot { color: var(--orange); }
    .code { font-size: 3rem; font-weight: 800; margin: 0; }
    h1 { font-size: 1.25rem; margin: 8px 0 12px; }
    p { color: var(--grey); line-height: 1.55; margin: 0 0 26px; }
    .btn {
      display: inline-block; text-decoration: none;
      background: var(--orange); color: #1a1205; font-weight: 700;
      padding: 12px 22px; border-radius: 10px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">Hazard<span class="dot">Link</span></div>
    <p class="code">404</p>
    <h1>Page not found</h1>
    <p>That page doesn't exist. Head back to the homepage to learn about HazardLink.</p>
    <a class="btn" href="/">Back to home</a>
  </main>
</body>
</html>
