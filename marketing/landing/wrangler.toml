# HazardLink marketing landing page — Cloudflare Workers static-assets config.
#
# Serves the single-page marketing site (index.html) on the apex domain
# hazardlink.ie, the same way web/ serves the dashboard on app.hazardlink.ie.
#
# Deploy:
#   cd marketing/landing
#   npx wrangler deploy
#
# Prerequisite: hazardlink.ie is on this Cloudflare account (it is — the apex
# was proxied during the original landing-page rollout). With
# custom_domain = true, Cloudflare creates/updates the route + SSL cert.
#
# worker.js wraps the static assets: it serves the real page, but on any
# failure returns a branded "we'll be right back" holding page (503 +
# Retry-After) instead of Cloudflare's raw error page. run_worker_first makes
# the Worker run on every request so it can catch asset-pipeline errors.

name = "hazardlink-marketing"
main = "worker.js"
compatibility_date = "2025-05-29"

routes = [
  { pattern = "hazardlink.ie", custom_domain = true },
]

[assets]
# Serve ONLY public/ (just index.html) so wrangler config + .wrangler cache
# never get uploaded as public assets.
directory = "./public"
# Single static page (no client-side routing — the demo preview just swaps
# content in-place). Serve a real 404 for unknown paths instead of a catch-all
# 200, so scanners/crawlers can tell a missing page from the homepage and we
# don't mask non-existent /api, config-file, or admin paths.
not_found_handling = "404-page"
# Let worker.js read assets via env.ASSETS, and run it before asset serving
# so it can wrap everything in try/catch → graceful holding page on error.
binding = "ASSETS"
run_worker_first = true
