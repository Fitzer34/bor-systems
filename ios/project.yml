name: BORSystems
options:
  bundleIdPrefix: com.zeroslip
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  createIntermediateGroups: true
  developmentLanguage: en
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"   # 1 = iPhone only (watch handled per-target below)
    GENERATE_INFOPLIST_FILE: NO
    SUPPORTS_MACCATALYST: NO
    ENABLE_PREVIEWS: YES

targets:
  BORSystems:
    type: application
    platform: iOS
    sources:
      - path: BORSystems
    info:
      path: BORSystems/Info.plist
      properties:
        CFBundleName: HazardLink
        CFBundleDisplayName: HazardLink
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: YES
          NSAllowsArbitraryLoads: YES   # dev only — tighten in production
        NSBluetoothAlwaysUsageDescription: "HazardLink uses Bluetooth to connect to new hangers during first-time Wi-Fi setup."
        UIBackgroundModes:
          - remote-notification
        UIRequiredDeviceCapabilities:
          - arm64
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.hazardlink.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: BORSystems/BORSystems.entitlements
    dependencies:
      # Build the watch app before the iPhone app. embed:false because
      # XcodeGen's auto-embed phase doesn't reliably handle watchOS 9+
      # single-target apps — the explicit post-build script below does
      # the embed copy with zero ambiguity.
      - target: BORSystemsWatch
        embed: false
    # Explicit embed of the watch app into the iPhone app bundle.
    # Without this, the iPhone bundle has no Watch/ subdirectory and
    # Apple's Watch app on the iPhone has nothing to install over BT,
    # surfacing as "couldn't install app at this time".
    #
    # Runs after both apps are built. For dev installs (Debug, ad-hoc
    # signing) this is sufficient. For App Store / TestFlight we may
    # need to re-sign — flag for future work.
    postBuildScripts:
      - name: Embed Watch App
        script: |
          set -e
          # When the iPhone target builds, BUILT_PRODUCTS_DIR points at
          # Debug-iphoneos/. The watch app builds into Debug-watchos/ as a
          # sibling directory. Search both — Xcode places the watch artifact
          # in the sibling dir, so the literal $BUILT_PRODUCTS_DIR/X.app
          # won't find it.
          WATCH_APP=""
          for candidate in \
              "$BUILT_PRODUCTS_DIR/BORSystemsWatch.app" \
              "$BUILT_PRODUCTS_DIR/../${CONFIGURATION}-watchos/BORSystemsWatch.app" \
              "$BUILD_DIR/${CONFIGURATION}-watchos/BORSystemsWatch.app"; do
            if [ -d "$candidate" ]; then
              WATCH_APP="$candidate"
              break
            fi
          done

          if [ -z "$WATCH_APP" ]; then
            echo "error: BORSystemsWatch.app not found in any of:"
            echo "  $BUILT_PRODUCTS_DIR/BORSystemsWatch.app"
            echo "  $BUILT_PRODUCTS_DIR/../${CONFIGURATION}-watchos/BORSystemsWatch.app"
            echo "  $BUILD_DIR/${CONFIGURATION}-watchos/BORSystemsWatch.app"
            exit 1
          fi

          DST="$BUILT_PRODUCTS_DIR/$WRAPPER_NAME/Watch"
          mkdir -p "$DST"
          rm -rf "$DST/BORSystemsWatch.app"
          cp -R "$WATCH_APP" "$DST/"
          echo "Embedded watch app from $WATCH_APP to $DST/BORSystemsWatch.app"
        basedOnDependencyAnalysis: false

  # ─── watchOS companion ──────────────────────────────────────────────
  # Single-target SwiftUI watch app (watchOS 9+ style — no separate
  # WatchKit Extension required). Glanceable active-alerts list, can
  # acknowledge alerts and dispatches directly from the wrist, and a
  # complication for the watch face showing the open-alert count.
  BORSystemsWatch:
    type: application
    platform: watchOS
    sources:
      - path: BORSystemsWatch
    info:
      path: BORSystemsWatch/Info.plist
      properties:
        CFBundleName: HazardLink
        CFBundleDisplayName: HazardLink
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.hazardlink.app
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: YES
          NSAllowsArbitraryLoads: YES
    settings:
      base:
        WATCHOS_DEPLOYMENT_TARGET: "9.0"
        TARGETED_DEVICE_FAMILY: "4"   # 4 = Apple Watch
        PRODUCT_BUNDLE_IDENTIFIER: com.hazardlink.app.watchkitapp
        # Intentionally NOT setting ASSETCATALOG_COMPILER_APPICON_NAME — the
        # iPhone's AppIcon asset doesn't have watch-icon variants, and we
        # haven't designed a watch-specific icon yet. The watch app will
        # show a generic placeholder until we add a proper icon set.
        # ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: NO
