name: BORSystems
options:
  bundleIdPrefix: com.borsystems
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  createIntermediateGroups: true
  developmentLanguage: en
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"   # 1 = iPhone only (watch handled per-target below)
    GENERATE_INFOPLIST_FILE: NO
    SUPPORTS_MACCATALYST: NO
    ENABLE_PREVIEWS: YES

targets:
  BORSystems:
    type: application
    platform: iOS
    sources:
      - path: BORSystems
    info:
      path: BORSystems/Info.plist
      properties:
        CFBundleName: BOR Systems
        CFBundleDisplayName: BOR Systems
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: YES
          NSAllowsArbitraryLoads: YES   # dev only — tighten in production
        NSBluetoothAlwaysUsageDescription: "BOR Systems uses Bluetooth to connect to new hangers during first-time Wi-Fi setup."
        UIBackgroundModes:
          - remote-notification
        UIRequiredDeviceCapabilities:
          - arm64
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.borsystems.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: BORSystems/BORSystems.entitlements
    dependencies:
      # Watch app must be EMBEDDED inside the iPhone app bundle (copied
      # into BORSystems.app/Watch/BORSystemsWatch.app) so iOS knows to
      # offer it for install in the Apple Watch app on the iPhone.
      # Without `embed: true` the watch app is built but never makes it
      # into the iPhone bundle — Apple's Watch app then says "couldn't
      # install app at this time" because there's nothing to install.
      - target: BORSystemsWatch
        embed: true
        codeSign: false

  # ─── watchOS companion ──────────────────────────────────────────────
  # Single-target SwiftUI watch app (watchOS 9+ style — no separate
  # WatchKit Extension required). Glanceable active-alerts list, can
  # acknowledge alerts and dispatches directly from the wrist, and a
  # complication for the watch face showing the open-alert count.
  BORSystemsWatch:
    type: application
    platform: watchOS
    sources:
      - path: BORSystemsWatch
    info:
      path: BORSystemsWatch/Info.plist
      properties:
        CFBundleName: BOR Systems
        CFBundleDisplayName: BOR Systems
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.borsystems.app
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: YES
          NSAllowsArbitraryLoads: YES
    settings:
      base:
        WATCHOS_DEPLOYMENT_TARGET: "9.0"
        TARGETED_DEVICE_FAMILY: "4"   # 4 = Apple Watch
        PRODUCT_BUNDLE_IDENTIFIER: com.borsystems.app.watchkitapp
        # Intentionally NOT setting ASSETCATALOG_COMPILER_APPICON_NAME — the
        # iPhone's AppIcon asset doesn't have watch-icon variants, and we
        # haven't designed a watch-specific icon yet. The watch app will
        # show a generic placeholder until we add a proper icon set.
        # ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: NO
