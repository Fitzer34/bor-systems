name: BORSystems
options:
  bundleIdPrefix: com.borsystems
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  developmentLanguage: en
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"   # 1 = iPhone only
    GENERATE_INFOPLIST_FILE: NO
    SUPPORTS_MACCATALYST: NO
    ENABLE_PREVIEWS: YES

targets:
  BORSystems:
    type: application
    platform: iOS
    sources:
      - path: BORSystems
    info:
      path: BORSystems/Info.plist
      properties:
        CFBundleName: BOR Systems
        CFBundleDisplayName: BOR Systems
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: YES
          NSAllowsArbitraryLoads: YES   # dev only — tighten in production
        NSBluetoothAlwaysUsageDescription: "BOR Systems uses Bluetooth to connect to new hangers during first-time Wi-Fi setup."
        UIBackgroundModes:
          - remote-notification
        UIRequiredDeviceCapabilities:
          - arm64
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.borsystems.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: BORSystems/BORSystems.entitlements
