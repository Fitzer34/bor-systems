databases:
  - name: bor-systems-db
    databaseName: bor_systems
    user: bor
    plan: free
    region: frankfurt   # EU region for GDPR (Ireland/UK customers)

services:
  # Backend API + LoRaWAN webhook + escalation timer
  - type: web
    name: bor-systems-backend
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npm run build
    # Run any pending migrations on every deploy, optionally (re)seed the demo
    # org when SEED_DEMO=1, then start the server. The seed is idempotent —
    # safe to leave enabled; it only tops up missing demo rows.
    startCommand: npm run migrate:prod && (if [ "$SEED_DEMO" = "1" ]; then npm run db:seed:demo || true; fi) && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000      # Render free tier expects this
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: bor-systems-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TTS_WEBHOOK_SECRET
        generateValue: true
      - key: RESOLUTION_TIMER_MINUTES
        value: 15
      # Set to "1" to (re)seed the reviewer demo org on deploy. Idempotent —
      # only adds missing demo rows. Leave at 1 to keep the demo populated, or
      # set to 0 once you no longer need it.
      - key: SEED_DEMO
        value: 1
      # Notification credentials — set these in the Render dashboard later if you want
      # real push / SMS / email delivery. Leaving them empty means the system records
      # notification intents but doesn't actually send.
      - key: FCM_PROJECT_ID
        sync: false
      - key: FCM_PRIVATE_KEY
        sync: false
      - key: FCM_CLIENT_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # Cloudflare R2 — persistent file storage for floor-plan uploads.
      # Set these in the Render dashboard once your R2 bucket exists.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

  # React dashboard, served as a static site (no region — Render serves
  # static sites from a global CDN)
  - type: web
    name: bor-systems-web
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: bor-systems-backend
          property: host
    routes:
      - type: rewrite
        source: /api/*
        destination: https://bor-systems-backend.onrender.com/*
      - type: rewrite
        source: /uploads/*
        destination: https://bor-systems-backend.onrender.com/uploads/*
      - type: rewrite
        source: /*
        destination: /index.html
