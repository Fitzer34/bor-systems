; BOR Systems firmware — Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262)
;
; Three build environments share the same source tree. Mode is selected via a
; build flag so the compiler strips out the irrelevant code paths entirely —
; a hanger build doesn't pull in HTTPClient, a gateway build doesn't pull in
; deep-sleep helpers. Same firmware repo, three SKUs.
;
;   pio run -e hanger          # battery hanger: LoRa tx + BLE first-boot setup
;   pio run -e gateway         # mains gateway: LoRa rx + HTTPS forward to cloud
;   pio run -e hanger_wifi     # mains hanger: WiFi direct to cloud (no gateway)
;
; Flash via:
;   pio run -e hanger -t upload
;   pio device monitor

[platformio]
default_envs = hanger
src_dir = src

[env]
platform = espressif32@6.7.0
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLORA_FREQ_HZ=868000000          ; EU868 ISM band
    -DLORA_TX_POWER_DBM=14            ; legal limit on EU868 sub-band
    -DLORA_SPREADING_FACTOR=9         ; SF9 — ~600 ms ToA, ~5 km LoS, good
                                      ; indoor penetration; bump to SF11/12
                                      ; via downlink if range is marginal
    -DLORA_BANDWIDTH_KHZ=125
    -DLORA_CODING_RATE=5              ; 4/5 — light error correction
    -DFW_MAJOR=0
    -DFW_MINOR=2
    ; Webhook secret is read from the BOR_WEBHOOK_SECRET shell env var at
    ; build time and baked into the firmware NVS default on first boot.
    ; NEVER hardcode the value here — that would put it in git. To build:
    ;   export BOR_WEBHOOK_SECRET="..."   (or set in your shell rc)
    ;   pio run -e gateway -t upload
    ; Empty if unset, in which case heartbeats return 401 until provisioned
    ; via the BLE setup flow.
    -DBOR_WEBHOOK_SECRET_BUILD="\"${sysenv.BOR_WEBHOOK_SECRET}\""

lib_deps =
    jgromes/RadioLib@^6.5.0           ; SX1262 driver — battle-tested
    h2zero/NimBLE-Arduino@^1.4.1      ; small-footprint BLE peripheral
    bblanchon/ArduinoJson@^7.0.4      ; webhook payload encoding (gateway)
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.5.0


; ─── HANGER (battery, LoRa, BLE setup) ──────────────────────────────────────
[env:hanger]
build_flags =
    ${env.build_flags}
    -DBOR_MODE_HANGER

; ─── GATEWAY (mains, LoRa rx, WiFi forward to cloud) ────────────────────────
[env:gateway]
build_flags =
    ${env.build_flags}
    -DBOR_MODE_GATEWAY

; ─── HANGER WIFI MODE (mains, WiFi direct, no LoRa) ─────────────────────────
; For customers with strong WiFi everywhere who don't want a gateway box.
[env:hanger_wifi]
build_flags =
    ${env.build_flags}
    -DBOR_MODE_HANGER_WIFI
